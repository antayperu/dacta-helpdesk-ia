# DACTA Help Desk IA v1.0 — Configuracion base
# Autor: Camilo Ortega FR
# Fecha: 2026-05-31

# Servidor
server.port=8080

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/dacta_helpdesk
spring.datasource.username=dacta_user
spring.datasource.password=dacta_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Logs
logging.level.com.dacta.helpdesk=INFO
logging.level.org.springframework.security=WARN
